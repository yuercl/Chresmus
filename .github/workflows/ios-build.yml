name: ios-build

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: IPA export method
        required: true
        default: release-testing
        type: choice
        options:
          - release-testing
          - debugging
          - app-store-connect
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - ".github/workflows/ios-build.yml"
      - "apps/tauri/**"
      - "apps/web/**"
      - "apps/server/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "scripts/**"

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CI: "true"
      IOS_EXPORT_METHOD: ${{ github.event.inputs.export_method || 'release-testing' }}
      HAS_AUTOMATIC_SIGNING: ${{ secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && secrets.APPLE_API_PRIVATE_KEY != '' && secrets.APPLE_DEVELOPMENT_TEAM != '' }}
      HAS_MANUAL_SIGNING: ${{ secrets.IOS_CERTIFICATE != '' && secrets.IOS_CERTIFICATE_PASSWORD != '' && secrets.IOS_MOBILE_PROVISION != '' && secrets.APPLE_DEVELOPMENT_TEAM != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm run prepare:workspace-dist

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show signing mode
        run: |
          set -euo pipefail
          if [ "${HAS_AUTOMATIC_SIGNING}" = "true" ] || [ "${HAS_MANUAL_SIGNING}" = "true" ]; then
            echo "Building signed iOS artifacts."
          else
            echo "No Apple signing secrets configured. Building unsigned iOS artifacts for local re-signing."
          fi

      - name: Write App Store Connect API key
        if: ${{ env.HAS_AUTOMATIC_SIGNING == 'true' }}
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          key_path="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Generate Tauri icons
        run: pnpm --filter @chresmus/tauri icon

      - name: Initialize iOS project
        run: pnpm --filter @chresmus/tauri ios:init

      - name: Build unsigned iOS archive
        if: ${{ env.HAS_AUTOMATIC_SIGNING != 'true' && env.HAS_MANUAL_SIGNING != 'true' }}
        run: |
          set -euo pipefail
          apple_dir="apps/tauri/src-tauri/gen/apple"
          xcodeproj="$(find "$apple_dir" -maxdepth 1 -name '*.xcodeproj' -print -quit)"
          if [ -z "$xcodeproj" ]; then
            echo "Expected a generated .xcodeproj in $apple_dir" >&2
            exit 1
          fi

          workspace="$xcodeproj/project.xcworkspace"
          if [ ! -d "$workspace" ]; then
            echo "Expected a generated workspace at $workspace" >&2
            exit 1
          fi

          scheme="$(xcodebuild -list -json -workspace "$workspace" | node -e 'const fs = require("node:fs"); const data = JSON.parse(fs.readFileSync(0, "utf8")); const schemes = data.workspace?.schemes; if (!Array.isArray(schemes) || schemes.length === 0 || typeof schemes[0] !== "string" || schemes[0].trim() === "") { process.stderr.write("Unable to determine iOS scheme from xcodebuild output\\n"); process.exit(1); } process.stdout.write(schemes[0].trim());')"
          archive_dir="$apple_dir/build/arm64"
          archive_path="$archive_dir/${scheme}.xcarchive"

          mkdir -p "$archive_dir"
          xcodebuild \
            -workspace "$workspace" \
            -scheme "$scheme" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$archive_path" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Package unsigned IPA
        if: ${{ env.HAS_AUTOMATIC_SIGNING != 'true' && env.HAS_MANUAL_SIGNING != 'true' }}
        run: |
          set -euo pipefail
          archive_path="$(find apps/tauri/src-tauri/gen/apple/build -type d -name '*.xcarchive' -print -quit)"
          if [ -z "$archive_path" ]; then
            echo "Expected an unsigned .xcarchive to package" >&2
            exit 1
          fi

          app_path="$(find "$archive_path/Products/Applications" -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "Expected an .app inside $archive_path/Products/Applications" >&2
            exit 1
          fi

          app_name="$(basename "$app_path" .app)"
          ipa_dir="apps/tauri/src-tauri/gen/apple/build/arm64"
          ipa_path="$ipa_dir/${app_name}-unsigned.ipa"
          staging_dir="$RUNNER_TEMP/unsigned-ipa"

          rm -rf "$staging_dir"
          mkdir -p "$staging_dir/Payload"
          cp -R "$app_path" "$staging_dir/Payload/"
          rm -f "$ipa_path"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$staging_dir/Payload" "$ipa_path"
          echo "Packaged unsigned IPA at $ipa_path"

      - name: Build signed iOS IPA
        if: ${{ env.HAS_AUTOMATIC_SIGNING == 'true' || env.HAS_MANUAL_SIGNING == 'true' }}
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
        run: pnpm --filter @chresmus/tauri ios:build -- --method "$IOS_EXPORT_METHOD"

      - name: Prepare unsigned iOS project artifacts
        if: ${{ env.HAS_AUTOMATIC_SIGNING != 'true' && env.HAS_MANUAL_SIGNING != 'true' }}
        run: |
          set -euo pipefail
          echo "No Apple signing secrets configured."
          echo "Uploading generated unsigned IPA, archive, and Xcode project for local signing."

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifacts
          path: |
            apps/tauri/src-tauri/gen/apple/build/arm64/*.ipa
            apps/tauri/src-tauri/gen/apple/build/**/*.xcarchive
            apps/tauri/src-tauri/gen/apple/*.xcodeproj
            apps/tauri/src-tauri/gen/apple/**/*.xcworkspace
            apps/tauri/src-tauri/gen/apple/ExportOptions.plist
          if-no-files-found: warn
